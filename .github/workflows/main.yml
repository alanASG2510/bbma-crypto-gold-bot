name: BTC EMA Crossover Alert Bot

on:
  schedule:
    # Run every day at 00:05 UTC (after daily market close)
    - cron: '5 0 * * *'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  alert-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run BTC EMA Alert Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKER: BTC-USD
          EMA_FAST: 12
          EMA_SLOW: 26
          HEALTH_INTERVAL: 7
        run: python btc_ema_bot.py

      - name: Save state to cache
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-state-${{ github.run_id }}
          path: bot_state.json
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            bot_state.json
            bot_state.json.backup
          retention-days: 7
