name: ETH Signal Bot

on:
  schedule:
    # Run every day at 8:00 AM and 8:00 PM Malaysia time (UTC+8)
    # 00:00 UTC and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  signal-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests
    
    - name: Run signal detector
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python eth_signal_bot.py
    
    - name: Commit state file
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add trade_state.json || true
        git diff --staged --quiet || git commit -m "Update trade state - $(date -u +%Y-%m-%d)"
        git push || true
